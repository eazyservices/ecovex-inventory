<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ecovex Inventory — Log Purchase</title>
<link rel="stylesheet" href="../css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/config.js"></script>
<script src="../js/shared.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <img src="../assets/logo.png" alt="" class="logo" onerror="this.style.display='none'">
    <div>
      <h1><a href="../index.html">ECOVEX Inventory</a></h1>
      <p>Log Purchase</p>
    </div>
  </header>
  <nav id="nav"></nav>

  <div class="subtabs" id="subtabs">
    <button data-mode="material" class="active">Materials Purchase</button>
    <button data-mode="solution">Solutions Log</button>
  </div>
  <div id="msg"></div>
  <div id="content"></div>
</div>

<script>
renderNav('purchase', 'pages');
let mode = 'material';

document.querySelectorAll('#subtabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#subtabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    render();
  });
});

function costPreviewHtml() {
  return `<div id="cost-preview" class="empty" style="margin-top:-4px">Landed cost: —</div>`;
}

function wireCostPreview(form) {
  const qtyField = form.querySelector('[name="quantity"], [name="litres"]');
  const costField = form.querySelector('[name="cost_amount"]');
  const gstField = form.querySelector('[name="gst_percent"]');
  const transportField = form.querySelector('[name="transport_cost"]');
  const preview = form.querySelector('#cost-preview');

  function update() {
    const qty = Number(qtyField.value) || 0;
    const base = Number(costField.value) || 0;
    const gst = Number(gstField.value) || 0;
    const transport = Number(transportField.value) || 0;
    const gstAmt = Math.round(base * gst / 100 * 100) / 100;
    const total = base + gstAmt + transport;
    const perUnit = qty > 0 ? total / qty : 0;
    preview.innerHTML = `Base cost ₹${base.toFixed(2)} + GST ₹${gstAmt.toFixed(2)} + transport ₹${transport.toFixed(2)} = <strong>₹${total.toFixed(2)} landed</strong>` +
      (qty > 0 ? `<br>≈ ₹${perUnit.toFixed(2)} per unit` : '');
  }
  [qtyField, costField, gstField, transportField].forEach(f => f.addEventListener('input', update));
  update();
}

async function render() {
  const msg = document.getElementById('msg');
  msg.innerHTML = '';
  const content = document.getElementById('content');

  if (mode === 'material') {
    const { data: materials } = await db.from('materials').select('id,name').order('name');
    content.innerHTML = `<form class="card" id="material-form">
      <label>Item Name
        <select name="material_id" required>
          <option value="">Select item…</option>
          ${materials.map(m => `<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('')}
        </select>
      </label>
      <label>Purchase Date<input type="date" name="purchase_date" value="${todayStr()}" required></label>
      <label>Entry Type
        <select name="entry_type" id="entry-type-select">
          <option value="Purchase">Purchase</option>
          <option value="Opening Stock">Opening Stock (existing material, not a new purchase)</option>
        </select>
      </label>
      <label>Quantity<input type="number" name="quantity" min="0" step="1" required></label>
      <label>Total Cost Paid (₹, before GST) <span style="font-weight:400;color:#888">what the invoice/bill says for this quantity, not a per-piece rate</span><input type="number" name="cost_amount" min="0" step="0.01" value="0" required></label>
      <label>GST % <input type="number" name="gst_percent" min="0" step="0.01" value="0" list="gst-slabs">
        <datalist id="gst-slabs"><option value="0"><option value="5"><option value="12"><option value="18"><option value="28"></datalist>
      </label>
      <label>Transport / Delivery Cost (₹, flat)<input type="number" name="transport_cost" min="0" step="0.01" value="0"></label>
      ${costPreviewHtml()}
      <label>Supplier / Source <span style="font-weight:400;color:#888">(optional for opening stock)</span><input type="text" name="supplier"></label>
      <label>Invoice / Ref No.<input type="text" name="invoice_ref"></label>
      <label>Remarks — why this entry<textarea name="remarks" rows="2" placeholder="e.g. existing stock counted on system launch day"></textarea></label>
      <button class="btn" type="submit">Log Entry</button>
    </form>`;
    if (materials.length === 0) showMsg(msg, 'error', 'No materials set up yet — add one under Manage Items first.');

    const form = document.getElementById('material-form');
    wireCostPreview(form);
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const btn = form.querySelector('button');
      btn.disabled = true; btn.textContent = 'Saving…';
      const { error } = await db.from('materials_purchases').insert({
        material_id: fd.get('material_id'),
        purchase_date: fd.get('purchase_date'),
        entry_type: fd.get('entry_type'),
        quantity: Number(fd.get('quantity')),
        cost_amount: Number(fd.get('cost_amount') || 0),
        gst_percent: Number(fd.get('gst_percent') || 0),
        transport_cost: Number(fd.get('transport_cost') || 0),
        supplier: fd.get('supplier') || null,
        invoice_ref: fd.get('invoice_ref') || null,
        remarks: fd.get('remarks') || null,
      });
      btn.disabled = false; btn.textContent = 'Log Entry';
      if (error) return showMsg(msg, 'error', error.message);
      showMsg(msg, 'success', fd.get('entry_type') === 'Opening Stock' ? 'Opening stock recorded.' : 'Purchase logged with full landed cost. See it anytime under History.');
      form.reset();
    });

  } else {
    const { data: solutions } = await db.from('solutions').select('id,name,bottle_size_ml').order('name');
    const { data: formulas } = await db.from('formulas').select('*').eq('is_active', true).order('name');
    content.innerHTML = `<form class="card" id="solution-form">
      <label>Solution Name
        <select name="solution_id" required>
          <option value="">Select solution…</option>
          ${solutions.map(s => `<option value="${s.id}" data-size="${s.bottle_size_ml}">${escapeHtml(s.name)} (${s.bottle_size_ml}ml bottle)</option>`).join('')}
        </select>
      </label>
      <label>Type
        <select name="log_type">
          <option value="Purchased">Purchased</option>
          <option value="Prepared">Prepared</option>
          <option value="Opening Stock">Opening Stock (existing solution, not new)</option>
        </select>
      </label>
      <label id="formula-field" style="display:none">Formula <span style="font-weight:400;color:#888">(auto-calculates ingredients used + batch cost)</span>
        <select name="formula_id">
          <option value="">No formula — enter cost manually</option>
          ${(formulas || []).map(f => `<option value="${f.id}" data-solution="${f.solution_id}" data-base="${f.base_batch_litres}">${escapeHtml(f.name)} (base ${f.base_batch_litres}L)</option>`).join('')}
        </select>
      </label>
      <label>Date<input type="date" name="log_date" value="${todayStr()}" required></label>
      <label>Litres<input type="number" name="litres" min="0" step="0.01" required></label>
      <div id="bottle-hint" class="empty">Bottles: —</div>
      <div id="ingredient-preview"></div>
      <label id="cost-fields-material">Total Cost Paid (₹, before GST) <span style="font-weight:400;color:#888">what the invoice/bill says for these litres, not a per-litre rate</span><input type="number" name="cost_amount" min="0" step="0.01" value="0"></label>
      <label id="gst-field">GST % <input type="number" name="gst_percent" min="0" step="0.01" value="0" list="gst-slabs2">
        <datalist id="gst-slabs2"><option value="0"><option value="5"><option value="12"><option value="18"><option value="28"></datalist>
      </label>
      <label>Transport / Delivery Cost (₹, flat)<input type="number" name="transport_cost" min="0" step="0.01" value="0"></label>
      ${costPreviewHtml()}
      <label>Batch / Ref<input type="text" name="batch_ref"></label>
      <label>Prepared By<input type="text" name="prepared_by"></label>
      <label>Notes — why this batch<textarea name="cost_notes" rows="2" placeholder="e.g. monthly prep run"></textarea></label>
      <button class="btn" type="submit">Log Solution Entry</button>
    </form>`;
    if (solutions.length === 0) showMsg(msg, 'error', 'No solutions set up yet — add one under Manage Items first.');

    const form = document.getElementById('solution-form');
    const logTypeField = form.querySelector('[name="log_type"]');
    const formulaField = document.getElementById('formula-field');
    const formulaSelect = form.querySelector('[name="formula_id"]');
    const solutionSelect = form.querySelector('[name="solution_id"]');
    const litresField = form.querySelector('[name="litres"]');
    const bottleHint = document.getElementById('bottle-hint');
    const ingredientPreview = document.getElementById('ingredient-preview');
    const costFieldsMaterial = document.getElementById('cost-fields-material');
    const gstField = document.getElementById('gst-field');
    const costPreview = document.getElementById('cost-preview');

    function toggleFormulaVisibility() {
      const isPrepared = logTypeField.value === 'Prepared';
      formulaField.style.display = isPrepared ? '' : 'none';
      if (!isPrepared) { formulaSelect.value = ''; ingredientPreview.innerHTML = ''; }
      updateFormulaOptionsForSolution();
      updateCostFieldVisibility();
    }

    function updateFormulaOptionsForSolution() {
      const selectedSolutionId = solutionSelect.value;
      Array.from(formulaSelect.options).forEach(opt => {
        if (!opt.value) return;
        opt.hidden = selectedSolutionId && opt.dataset.solution !== selectedSolutionId;
      });
    }

    function updateCostFieldVisibility() {
      const usingFormula = logTypeField.value === 'Prepared' && formulaSelect.value;
      costFieldsMaterial.style.display = usingFormula ? 'none' : '';
      gstField.style.display = usingFormula ? 'none' : '';
      costPreview.style.display = usingFormula ? 'none' : '';
    }

    async function updateIngredientPreview() {
      updateCostFieldVisibility();
      const formulaId = formulaSelect.value;
      const litres = Number(litresField.value) || 0;
      if (!formulaId || litres <= 0) { ingredientPreview.innerHTML = ''; return; }

      const baseLitres = Number(formulaSelect.selectedOptions[0].dataset.base);
      const { data: ingredients } = await db.from('formula_ingredients').select('qty_per_batch, chemicals(name, unit, id)').eq('formula_id', formulaId);
      const { data: stock } = await db.from('chemical_stock').select('id, avg_unit_cost');
      const costMap = {};
      (stock || []).forEach(s => costMap[s.id] = Number(s.avg_unit_cost) || 0);

      let totalCost = 0;
      const rows = (ingredients || []).map(i => {
        const scaled = i.qty_per_batch * (litres / baseLitres);
        const unitCost = costMap[i.chemicals.id] || 0;
        const cost = scaled * unitCost;
        totalCost += cost;
        return `<tr><td>${escapeHtml(i.chemicals.name)}</td><td>${scaled.toFixed(2)} ${escapeHtml(i.chemicals.unit)}</td><td>₹${cost.toFixed(2)}</td></tr>`;
      });

      ingredientPreview.innerHTML = `<div class="section-title" style="margin-top:12px">Ingredients this batch will consume</div>
      <table><thead><tr><th>Chemical</th><th>Qty used</th><th>Cost</th></tr></thead><tbody>${rows.join('')}</tbody></table>
      <div class="msg success">Estimated batch cost: ₹${totalCost.toFixed(2)}</div>`;
    }

    function updateBottleHint() {
      const opt = solutionSelect.selectedOptions[0];
      const size = opt ? Number(opt.dataset.size) : 0;
      const litres = Number(litresField.value) || 0;
      if (size > 0 && litres > 0) {
        bottleHint.textContent = `≈ ${(litres / (size / 1000)).toFixed(2)} bottles of ${size}ml — calculated automatically`;
      } else {
        bottleHint.textContent = 'Bottles: —';
      }
    }

    logTypeField.addEventListener('change', toggleFormulaVisibility);
    solutionSelect.addEventListener('change', () => { updateBottleHint(); updateFormulaOptionsForSolution(); });
    formulaSelect.addEventListener('change', updateIngredientPreview);
    litresField.addEventListener('input', () => { updateBottleHint(); updateIngredientPreview(); });
    toggleFormulaVisibility();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const btn = form.querySelector('button');
      btn.disabled = true; btn.textContent = 'Saving…';
      const { error } = await db.from('solutions_log').insert({
        solution_id: fd.get('solution_id'),
        log_type: fd.get('log_type'),
        formula_id: fd.get('formula_id') || null,
        log_date: fd.get('log_date'),
        litres: Number(fd.get('litres')),
        cost_amount: Number(fd.get('cost_amount') || 0),
        gst_percent: Number(fd.get('gst_percent') || 0),
        transport_cost: Number(fd.get('transport_cost') || 0),
        batch_ref: fd.get('batch_ref') || null,
        prepared_by: fd.get('prepared_by') || null,
        cost_notes: fd.get('cost_notes') || null,
      });
      btn.disabled = false; btn.textContent = 'Log Solution Entry';
      if (error) return showMsg(msg, 'error', error.message);
      showMsg(msg, 'success', fd.get('formula_id') ? 'Batch logged — ingredients deducted from Chemicals stock automatically.' : 'Solution logged — bottles and landed cost calculated automatically.');
      form.reset();
      bottleHint.textContent = 'Bottles: —';
      ingredientPreview.innerHTML = '';
      toggleFormulaVisibility();
    });
  }
}


render();
</script>
</body>
</html>

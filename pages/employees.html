<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ecovex Inventory — Employees</title>
<link rel="stylesheet" href="../css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/config.js"></script>
<script src="../js/shared.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <img src="../assets/logo.png" alt="" class="logo" onerror="this.style.display='none'">
    <div>
      <h1><a href="../index.html">ECOVEX Inventory</a></h1>
      <p>Employees</p>
    </div>
  </header>
  <nav id="nav"></nav>

  <div class="subtabs" id="subtabs">
    <button data-mode="list" class="active">All Employees</button>
    <button data-mode="add">+ Add Employee</button>
    <button data-mode="history">Issuance History</button>
  </div>
  <div id="msg"></div>
  <div id="content"><p class="empty">Loading…</p></div>
</div>

<script>
renderNav('employees', 'pages');
let mode = 'list';
let historyEmployeeId = '';

document.querySelectorAll('#subtabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#subtabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    render();
  });
});

async function render() {
  const msg = document.getElementById('msg');
  msg.innerHTML = '';
  if (mode === 'list') return renderList();
  if (mode === 'add') return renderAdd();
  if (mode === 'history') return renderHistory();
}

async function renderList() {
  const content = document.getElementById('content');
  const { data, error } = await db.from('attendants').select('*').order('name');
  if (error) { showMsg(content, 'error', error.message); return; }
  if (!data || data.length === 0) { content.innerHTML = '<p class="empty">No employees yet — add one.</p>'; return; }

  content.innerHTML = `<table><thead><tr><th>Name</th><th>Code</th><th>Phone</th><th>Location</th><th>Joined</th><th>Status</th><th></th></tr></thead><tbody>
  ${data.map(a => `<tr>
    <td>${escapeHtml(a.name)}</td><td>${escapeHtml(a.code || '—')}</td><td>${escapeHtml(a.phone || '—')}</td><td>${escapeHtml(a.location || '—')}</td><td>${escapeHtml(a.joined_date || '—')}</td>
    <td><span class="badge ${a.active ? 'ok' : 'reorder'}">${a.active ? '✔ Active' : 'Inactive'}</span></td>
    <td><button class="btn secondary toggle-active-emp" data-id="${a.id}" data-active="${a.active}" style="padding:4px 10px;font-size:12px">${a.active ? 'Deactivate' : 'Reactivate'}</button></td>
  </tr>`).join('')}
  </tbody></table>`;

  content.querySelectorAll('.toggle-active-emp').forEach(btn => {
    btn.addEventListener('click', async () => {
      const newActive = btn.dataset.active !== 'true';
      if (!newActive && !confirm('Deactivate this employee? They\u2019ll stop showing up as an option for new kit issuances, but their past history stays intact.')) return;
      const { error } = await db.from('attendants').update({ active: newActive }).eq('id', btn.dataset.id);
      if (error) { showMsg(document.getElementById('msg'), 'error', error.message); return; }
      renderList();
    });
  });
}

async function renderAdd() {
  const content = document.getElementById('content');
  content.innerHTML = `<form class="card" id="new-emp-form">
    <label>Full Name<input type="text" name="name" required></label>
    <label>Employee Code <span style="font-weight:400;color:#888">(optional)</span><input type="text" name="code"></label>
    <label>Phone Number<input type="text" name="phone"></label>
    <label>Location<input type="text" name="location" placeholder="e.g. site / zone name"></label>
    <label>Joined Date<input type="date" name="joined_date" value="${todayStr()}"></label>
    <button class="btn" type="submit">Add Employee</button>
  </form>`;

  const form = document.getElementById('new-emp-form');
  const msg = document.getElementById('msg');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const btn = form.querySelector('button');
    btn.disabled = true; btn.textContent = 'Saving…';
    const { error } = await db.from('attendants').insert({
      name: fd.get('name'),
      code: fd.get('code') || null,
      phone: fd.get('phone') || null,
      location: fd.get('location') || null,
      joined_date: fd.get('joined_date') || todayStr(),
    });
    btn.disabled = false; btn.textContent = 'Add Employee';
    if (error) return showMsg(msg, 'error', error.message);
    showMsg(msg, 'success', 'Employee added. You can now issue a kit to them from Issue Kit.');
    form.reset();
  });
}

async function renderHistory() {
  const content = document.getElementById('content');
  const { data: attendants } = await db.from('attendants').select('id,name,code').order('name');

  content.innerHTML = `<div class="row-actions" style="align-items:flex-end">
    <label style="max-width:280px">Employee
      <select id="history-emp-select">
        <option value="">All Employees</option>
        ${(attendants || []).map(a => `<option value="${a.id}" ${a.id === historyEmployeeId ? 'selected' : ''}>${escapeHtml(a.name)}${a.code ? ' (' + escapeHtml(a.code) + ')' : ''}</option>`).join('')}
      </select>
    </label>
    <label style="max-width:170px">From<input type="date" id="history-date-from"></label>
    <label style="max-width:170px">To<input type="date" id="history-date-to"></label>
    <button class="btn secondary" id="history-download-btn" type="button">Download CSV</button>
  </div>
  <div id="history-results"></div>`;

  document.getElementById('history-emp-select').addEventListener('change', (e) => {
    historyEmployeeId = e.target.value;
    loadHistory();
  });
  document.getElementById('history-date-from').addEventListener('change', loadHistory);
  document.getElementById('history-date-to').addEventListener('change', loadHistory);
  document.getElementById('history-download-btn').addEventListener('click', downloadCsv);

  let currentRows = [];

  loadHistory();

  async function loadHistory() {
    const resultsBox = document.getElementById('history-results');
    resultsBox.innerHTML = '<p class="empty">Loading…</p>';

    let query = db.from('employee_issuance_history').select('*');
    if (historyEmployeeId) query = query.eq('attendant_id', historyEmployeeId);
    const from = document.getElementById('history-date-from').value;
    const to = document.getElementById('history-date-to').value;
    if (from) query = query.gte('issue_date', from);
    if (to) query = query.lte('issue_date', to);

    const { data, error } = await query;
    if (error) { showMsg(resultsBox, 'error', error.message); return; }
    currentRows = data || [];
    if (currentRows.length === 0) { resultsBox.innerHTML = '<p class="empty">No issuance history for this selection.</p>'; return; }

    resultsBox.innerHTML = `<div class="empty" style="margin-bottom:10px">${currentRows.length} entries</div>
    <table><thead><tr><th>Date</th>${historyEmployeeId ? '' : '<th>Employee</th>'}<th>Category</th><th>Item</th><th>Qty</th><th>Litres</th><th>Issued By</th><th>Remarks</th></tr></thead><tbody>
    ${currentRows.map(r => `<tr><td>${escapeHtml(r.issue_date)}</td>${historyEmployeeId ? '' : `<td>${escapeHtml(r.attendant_name)}</td>`}<td>${escapeHtml(r.category)}</td><td>${escapeHtml(r.item_name)}</td><td>${r.qty_issued}</td><td>${r.litres_issued ? Number(r.litres_issued).toFixed(2) : '—'}</td><td>${escapeHtml(r.issued_by || '—')}</td><td>${escapeHtml(r.remarks || '—')}</td></tr>`).join('')}
    </tbody></table>`;
  }

  function downloadCsv() {
    if (currentRows.length === 0) { showMsg(document.getElementById('msg'), 'error', 'Nothing to download for this selection.'); return; }
    const headers = ['Date', 'Employee', 'Employee Code', 'Category', 'Item', 'Qty Issued', 'Litres Issued', 'Issued By', 'Remarks'];
    const escapeCsv = (val) => `"${String(val ?? '').replace(/"/g, '""')}"`;
    const lines = [headers.join(',')];
    currentRows.forEach(r => {
      lines.push([
        r.issue_date, r.attendant_name, r.attendant_code || '', r.category, r.item_name,
        r.qty_issued, r.litres_issued ?? '', r.issued_by || '', r.remarks || '',
      ].map(escapeCsv).join(','));
    });
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const from = document.getElementById('history-date-from').value || 'all';
    const to = document.getElementById('history-date-to').value || 'all';
    a.href = url;
    a.download = `issuance-history_${from}_to_${to}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
}

render();
</script>
</body>
</html>
